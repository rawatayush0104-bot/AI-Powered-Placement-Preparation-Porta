<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Performance Dashboard</title>

<link rel="stylesheet" href="performance.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Your Performance</h1>
        <p>Track your aptitude preparation progress</p>
    </div>

    <div class="cards">

        <div class="card">
            <h2 id="score">0</h2>
            <p>Latest Score</p>
        </div>

        <div class="card">
            <h2 id="percentage">0%</h2>
            <p>Accuracy</p>
        </div>

        <div class="card">
            <h2 id="attempts">1</h2>
            <p>Total Attempts</p>
        </div>

    </div>

    <div class="chart-box">
        <canvas id="performanceChart"></canvas>
    </div>

</div>

<script src="performance.js"></script>

</body>
</html>
