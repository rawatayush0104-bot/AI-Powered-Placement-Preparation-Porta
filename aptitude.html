    <!-- Main Content -->

    <div class="main">

        <div class="top">

            <div>
                <h1>Aptitude Quiz</h1>
                <p>Test your logical, numerical and analytical skills.</p>
            </div>

            <div class="timer" id="timer">
                05:00
            </div>

        </div>

        <div class="quiz-card">

            <div class="progress-info">
                <span id="questionNo"></span>
                <span id="percentage"></span>
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <h4>APTITUDE QUESTION</h4>

            <h2 id="question"></h2>

            <div class="series" id="series"></div>

            <div class="options" id="options"></div>

            <div class="buttons">

                <button class="prev" onclick="prevQuestion()">
                    Previous
                </button>

                <button class="next" onclick="nextQuestion()">
                    Next
                </button>

            </div>

        </div>

    </div>

</div>
